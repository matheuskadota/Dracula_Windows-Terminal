# ~/.config/starship.toml (Dracula Edition)

format = """
[оӮ¶](fg:#bd93f9)\
$username\
$hostname\
[оӮҙ](fg:#bd93f9) \
[оӮ¶](fg:#8be9fd)\
$directory\
[оӮҙ](fg:#8be9fd) \
$git_branch\
$character"""

[username]
show_always = true
style_user = "bg:#bd93f9 fg:#282a36"
format = '[ пҢҠ $user]($style)'

[hostname]
ssh_only = false
style = "bg:#bd93f9 fg:#282a36"
format = '[@$hostname ]($style)'

[directory]
style = "bg:#8be9fd fg:#282a36"
format = '[ пҒј $path ]($style)'
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "пҗҳ"
style = "bg:#50fa7b fg:#282a36"
format = '[оӮ¶](fg:#50fa7b)[ $symbol $branch ]($style)[оӮҙ](fg:#50fa7b) '

[character]
success_symbol = "\n[в•°в”Җп„…](bold #50fa7b) "
error_symbol = "\n[в•°в”Җп„…](bold #ff5555) "
